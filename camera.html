<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Câmera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      background-color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      gap: 16px;
    }

    .frame {
      position: relative;
      width: 400px;
      height: 400px;
      border: 2px solid #333;
      overflow: hidden;
      background: #000;
    }

    video, canvas#overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #result {
      font-size: 16px;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>
<body>

  <div class="frame">
    <video id="camera" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <canvas id="capture" style="display:none;"></canvas>

  <button id="toggleBtn">Parar detecção</button>
  <div id="result"></div>

  <script>
    const video     = document.getElementById('camera');
    const overlay   = document.getElementById('overlay');
    const capture   = document.getElementById('capture');
    const resultDiv = document.getElementById('result');
    const toggleBtn = document.getElementById('toggleBtn');

    const DISPLAY_W = 400;
    const DISPLAY_H = 400;

    overlay.width  = DISPLAY_W;
    overlay.height = DISPLAY_H;

    const octx = overlay.getContext('2d');
    const cctx  = capture.getContext('2d');

    let running  = true;
    let busy     = false;
    let lastSent = 0;

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err   => { alert('Erro ao acessar câmera: ' + err.message); });

    toggleBtn.onclick = () => {
      running = !running;
      toggleBtn.textContent = running ? "Parar detecção" : "Iniciar detecção";
      if (running) requestAnimationFrame(loop);
      else {
        octx.clearRect(0, 0, DISPLAY_W, DISPLAY_H);
        resultDiv.textContent = "";
      }
    };

    function drawBox(face, sentiment, vw, vh) {
      octx.clearRect(0, 0, DISPLAY_W, DISPLAY_H);
      if (!face) return;

      const sx = DISPLAY_W / vw;
      const sy = DISPLAY_H / vh;

      const x = face.x * sx;
      const y = face.y * sy;
      const w = face.w * sx;
      const h = face.h * sy;

      // Cor do quadrado muda conforme sentimento
      const isFeliz     = sentiment === "Feliz";
      const boxColor    = isFeliz ? "#00cc44" : "#3399ff";
      const labelBg     = isFeliz ? "#00cc44" : "#3399ff";
      const label       = sentiment;

      // Quadrado do rosto
      octx.lineWidth   = 3;
      octx.strokeStyle = boxColor;
      octx.strokeRect(x, y, w, h);

      // Fundo da etiqueta de sentimento
      const fontSize  = 18;
      octx.font       = `bold ${fontSize}px Arial`;
      const textW     = octx.measureText(label).width + 12;
      const textH     = fontSize + 10;
      const labelX    = x;
      const labelY    = y - textH - 2;

      octx.fillStyle = labelBg;
      octx.fillRect(labelX, labelY < 0 ? y + 2 : labelY, textW, textH);

      // Texto do sentimento
      octx.fillStyle    = "white";
      octx.textBaseline = "top";
      octx.fillText(label, labelX + 6, labelY < 0 ? y + 7 : labelY + 5);
    }

    async function sendFrame() {
      if (busy) return;
      busy = true;

      try {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (!vw || !vh) return;

        capture.width  = vw;
        capture.height = vh;

        cctx.drawImage(video, 0, 0, vw, vh);

        const blob = await new Promise(resolve =>
          capture.toBlob(resolve, 'image/jpeg', 0.8)
        );

        const formData = new FormData();
        formData.append('image', blob, 'frame.jpg');

        const res  = await fetch('http://127.0.0.1:5000/detect-face', {
          method: 'POST',
          body: formData
        });

        const data = await res.json();

        if (data.error) {
          resultDiv.innerHTML = `<span style="color:red;">Erro: ${data.error}</span>`;
          drawBox(null, null, vw, vh);
        } else {
          drawBox(data.primary, data.sentiment, vw, vh);

          if (data.primary) {
            resultDiv.innerHTML = `Rosto detectado  &nbsp;|&nbsp; <strong>${data.sentiment}</strong>`;
          } else {
            resultDiv.textContent = "Nenhum rosto detectado";
          }
        }

      } catch (err) {
        resultDiv.innerHTML = `<span style="color:red;">Erro: ${err.message}</span>`;
      } finally {
        busy = false;
      }
    }

    function loop(ts) {
      if (!running) return;

      if (!lastSent || (ts - lastSent) > 200) {
        lastSent = ts;
        sendFrame();
      }

      requestAnimationFrame(loop);
    }

    video.addEventListener('loadedmetadata', () => {
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
